name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive_ext: tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        if: runner.os != 'Windows'
        shell: bash
        env:
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          artifact_dir="dist/provenance-${VERSION}-${TARGET}"
          mkdir -p "$artifact_dir"
          cp "target/${TARGET}/release/provenance" "$artifact_dir/"
          cp README.md LICENSE "$artifact_dir/"
          tar -C dist -czf "dist/provenance-${VERSION}-${TARGET}.${ARCHIVE_EXT}" "$(basename "$artifact_dir")"
          rm -rf "$artifact_dir"

      - name: Package archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          $artifactDir = "dist/provenance-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item "target/$env:TARGET/release/provenance.exe" "$artifactDir/provenance.exe"
          Copy-Item README.md "$artifactDir/README.md"
          Copy-Item LICENSE "$artifactDir/LICENSE"
          Compress-Archive -Path "$artifactDir/*" -DestinationPath "dist/provenance-$env:VERSION-$env:TARGET.zip"
          Remove-Item -Recurse -Force $artifactDir

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: provenance-${{ matrix.target }}
          path: dist/provenance-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum provenance-* > "provenance-${VERSION}-checksums.txt"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes --verify-tag
          fi
